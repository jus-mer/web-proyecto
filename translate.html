<style>
  /* Oculta la barra superior de Google Translate */
  .goog-te-banner-frame.skiptranslate { display: none !important; }
  body { top: 0 !important; }

  /* Evita saltos por iframes de Google */
  html body .skiptranslate > iframe { visibility: hidden !important; }

  /* Contenedor del widget: en DOM pero invisible */
  .gtrans-slot { width: 0; height: 0; overflow: hidden; }

  /* Botón-bandera en la navbar */
  .nav-item.gtrans-flag { display: flex; align-items: center; }
  .nav-item.gtrans-flag a {
    text-decoration: none;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0 .4rem;
    cursor: pointer;
  }
</style>

<script>
  // ── Busca la sección derecha de la navbar de Quarto ──────────────────────────
  function findRightNav() {
    const targets = document.querySelectorAll(
      '#quarto-header .navbar .navbar-nav.ms-auto, #quarto-header .navbar .navbar-nav:last-child'
    );
    for (const el of targets) if (el) return el;
    return null;
  }

  // ── Lee el idioma actual desde la cookie de Google ───────────────────────────
  function currentLangFromCookie() {
    const m = document.cookie.match(/(?:^|;)\s*googtrans=([^;]+)/);
    if (!m) return 'es';
    const v = decodeURIComponent(m[1]).split('/');
    return v[v.length - 1] || 'es';
  }

  // ── Actualiza la bandera según el idioma activo ──────────────────────────────
  function updateFlag() {
    const a = document.getElementById('gtrans-flag-toggle');
    if (!a) return;
    const lang = currentLangFromCookie();
    a.textContent = (lang === 'en') ? '🇨🇱' : '🇬🇧';
    a.title       = (lang === 'en') ? 'Ver en español' : 'View in English';
    a.setAttribute('aria-label', a.title);
  }

  // ── Fallback: guarda cookie y recarga la página ──────────────────────────────
  function setCookieAndReload(lang) {
    const val  = `/auto/${lang}`;
    const d    = new Date(); d.setFullYear(d.getFullYear() + 1);
    const base = `googtrans=${val}; expires=${d.toUTCString()}; path=/`;
    const host = location.hostname;
    const root = '.' + host.replace(/^www\./, '');
    document.cookie = base;
    document.cookie = `${base}; domain=${host}`;
    document.cookie = `${base}; domain=${root}`;
    location.reload();
  }

  // ── Inserta el botón y el widget oculto en la navbar ────────────────────────
  function ensureNavItems() {
    const right = findRightNav();
    if (!right) return false;

    // Botón-bandera
    if (!document.getElementById('gtrans-flag-toggle')) {
      const li = document.createElement('li');
      li.className = 'nav-item gtrans-flag';
      li.innerHTML = `<a id="gtrans-flag-toggle" title="Cambiar idioma" role="button" tabindex="0">🌐</a>`;
      right.appendChild(li);
    }

    // Contenedor oculto del widget de Google
    if (!document.getElementById('google_translate_element')) {
      const li2 = document.createElement('li');
      li2.className = 'nav-item';
      li2.innerHTML = `<div id="google_translate_element" class="gtrans-slot"></div>`;
      right.appendChild(li2);
    }
    return true;
  }

  // ── Cambia idioma usando el combo interno de Google ──────────────────────────
  function changeViaCombo(lang) {
    const combo = document.querySelector('select.goog-te-combo');
    if (!combo) return false;
    combo.value = lang;
    combo.dispatchEvent(new Event('change'));
    setTimeout(updateFlag, 700);
    return true;
  }

  // ── Callback oficial requerido por Google Translate ──────────────────────────
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      {
        pageLanguage: 'es',
        includedLanguages: 'es,en',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      },
      'google_translate_element'
    );

    // Conecta eventos una vez que el DOM esté listo
    const tryWire = () => {
      ensureNavItems();
      updateFlag();

      const btn = document.getElementById('gtrans-flag-toggle');
      if (btn && !btn._wired) {
        btn._wired = true;

        const toggle = (e) => {
          e.preventDefault();
          const current = currentLangFromCookie();
          const next    = (current === 'en') ? 'es' : 'en';
          if (!changeViaCombo(next)) setCookieAndReload(next);
        };

        btn.addEventListener('click', toggle);
        // Accesibilidad: también responde a Enter/Space con teclado
        btn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') toggle(e);
        });
      }
    };

    // Espera a que Google inyecte el combo (hasta ~6 segundos)
    let tries = 0;
    const t = setInterval(() => {
      tries++;
      tryWire();
      if (document.querySelector('select.goog-te-combo') || tries > 30) {
        clearInterval(t);
      }
    }, 200);
  }

  // Expone el callback globalmente (requerido por Google)
  window.googleTranslateElementInit = googleTranslateElementInit;

  // Primer pintado de la bandera antes de que cargue el script de Google
  document.addEventListener('DOMContentLoaded', () => {
    ensureNavItems();
    updateFlag();
  });
</script>

<!-- Carga la librería de Google Translate con el callback registrado -->
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
